<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metallica Bar</title>
    <link rel="stylesheet" href="./12345678910.css">
    <link rel="icon" href="./stickers-logo-metallica.png" type="image/x-icon" sizes="16x16">
</head>
<body>
    <header class="header11">
        <h1 class="titre">Diabolo Sakura</h1>
    </header>
    <section id="section11">
    <div id="divimage" class="flex11">
        <img id="img" src="./ChatGPT Image 22 mars 2026, 21_10_15.png" alt="image" height="505px" width="300px">
    </div>
    <section>
    <div id="diving" class="flex11">
        <h1 id="titredes">Ingrédients</h1>
        <ul>
            <li>Limonade</li>
            <li>Sirop de grenadine</li>
        </ul>
    </div>
    <div id="divasso" class="flex11">
        <h1 id="titredes">Associations</h1>
        <p>Ce cocktail est fait pour le dessert.</p>
    </div>
    </section>
    </section>
    <footer>
        <input id="prenom" placeholder="Prénom" type="text">
        <input id="commentaire" placeholder="Spécificité" type="text">
        <button class="commander" id="commander">Commander</button>
    </footer>

    <script>
    document.getElementById('commander').addEventListener('click', async () => {
        const prenom = document.getElementById('prenom').value.trim();
        const commentaire = document.getElementById('commentaire').value.trim();

        if (!prenom) {
            alert("Veuillez entrer un prénom !");
            return;
        }

        // Envoi au script PHP
        const response = await fetch('commande11.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ prenom, commentaire })
        });

        const result = await response.json();
        alert(result.message);
    });
    
    </script>
    <script>
window.onpopstate = function() {
    window.location.href = "index.html";
};
</script>
<script>
document.addEventListener("keydown", function(event) {
    const active = document.activeElement;
    const isInput = active.tagName === "INPUT" || active.tagName === "TEXTAREA";

    if (event.key === "Backspace" && !isInput) {
        event.preventDefault();
        window.location.href = "ma-page.html";
    }
});
</script>
</body>
</html>
